syntax = "proto3";

package raftkv.rpc.v1;

message EventStreamRequest {
  string node_id = 1;
}

message RaftEvent {
  string node_id = 1;
  string type = 2;
  uint64 term = 3;
  uint64 log_index = 4;
  string message = 5;
}

service EventService {
  rpc StreamEvents(EventStreamRequest) returns (stream RaftEvent);
}

