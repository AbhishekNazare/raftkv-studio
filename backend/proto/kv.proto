syntax = "proto3";

package raftkv.rpc.v1;

message PutRequest {
  string key = 1;
  string value = 2;
}

message PutResponse {
  bool committed = 1;
  uint64 index = 2;
  string message = 3;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool found = 1;
  string value = 2;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool committed = 1;
  uint64 index = 2;
  string message = 3;
}

service KVService {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

