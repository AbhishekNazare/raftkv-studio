name: demos

on:
  push:
    branches: [main]
  pull_request:

jobs:
  demo-scripts:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgrpc++-dev \
            libprotobuf-dev \
            protobuf-compiler \
            protobuf-compiler-grpc

      - name: Run all demo scripts
        run: ./scripts/demo_all.sh
